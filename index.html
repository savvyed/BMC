<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMC Digital Health</title>
  <link rel="stylesheet" href="shared/css/styles.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <!-- ============================================================
       WELCOME — Translation mode chooser
       First screen every patient sees.
       Two paths: automatic translation (GTranslate) or choose a
       language manually. Choice is saved for the whole session.
       ============================================================ -->

  <main class="lang-selector-page" role="main">

    <div class="logo-placeholder" aria-label="BMC Logo placeholder">BMC Logo</div>

    <h1 class="welcome-heading">
      Welcome<br>
      Bienvenido<br>
      Bem-vindo<br>
      Byenveni<br>
      欢迎
    </h1>

    <nav class="mode-options" aria-label="Choose how to view this site">

      <!-- GTranslate path: go straight to home, widget translates the page -->
      <button class="mode-option mode-option--auto" id="btn-gtranslate" type="button">
        <span class="mode-option-icon" aria-hidden="true">🌐</span>
        <span class="mode-option-label">Translate automatically</span>
        <span class="mode-option-sub">
          Traducción automática ·
          Tradução automática ·
          Tradiksyon otomatik ·
          自动翻译
        </span>
      </button>

      <!-- Manual path: go to language selector, then ?lang=xx routing -->
      <button class="mode-option mode-option--manual" id="btn-manual" type="button">
        <span class="mode-option-icon" aria-hidden="true">🗂</span>
        <span class="mode-option-label">Choose my language</span>
        <span class="mode-option-sub">
          Seleccionar idioma ·
          Selecionar idioma ·
          Chwazi lang mwen ·
          选择语言
        </span>
      </button>

    </nav>

  </main>

  <!-- GTranslate mount point (hidden — engine only, no float bubble) -->
  <div class="gtranslate_wrapper"></div>

  <script src="shared/js/translation-switcher.js"></script>
  <script src="shared/js/main.js"></script>
  <script>
    /* Netlify Identity — redirect after CMS login */
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function(user) {
        if (!user) {
          window.netlifyIdentity.on('login', function() {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>
</body>
</html>
