backend:
  name: git-gateway
  branch: main

site_url: https://tiny-hamster-9bcc46.netlify.app
display_url: https://tiny-hamster-9bcc46.netlify.app

media_folder: media
public_folder: /media

# ── COLLECTIONS ─────────────────────────────────────────────────────────────
collections:

  # ── Course Challenges ──────────────────────────────────────────────────────
  # One file per challenge. All five languages are in each file.
  # To translate: open the challenge, find your language section,
  # and fill in each field. Leave a field blank to fall back to English.
  - name: challenges
