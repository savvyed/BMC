  # ── How-To Topics and Knowledge Base ────────────────────────────────────────
  # Step-by-step instructions shown in the Knowledge Base AND in challenge pages.
  # Edit here once — changes appear in both places automatically.
  #
  # IMPORTANT: Do not change the URL identifier on any topic.
  # It is used in page links throughout the site. Changing it will break links.
  - name: topics
    label: "How-To Topics"
    files:

      - name: topics
        label: "All Topics"
        file: content/topics.json
        fields:

          # challengeTopicRefs is intentionally not shown here.
          # It controls which topics appear in each challenge and is developer-managed.
          - label: "Topic catalog"
            name: catalog
            widget: object
            fields:

              - label: "Setting up your email"
                name: "email"
                widget: object
                fields:
                  - label: "Topics in this category"
                    name: topics
                    widget: list
                    label_singular: "Topic"
                    fields:
                      - label: "Title"
                        name: title
                        widget: string
                        hint: "Plain-language title shown on the topic page and in the challenge Watch step."
                      - label: "URL identifier"
                        name: slug
                        widget: string
                        hint: "Do not change — this value is used in page links throughout the site."
                      - label: "Step-by-step instructions"
                        name: steps
                        widget: list
                        label_singular: "Step"
                        summary: "{{fields.text}}"
                        fields:
                          - label: "Step instruction"
                            name: text
                            widget: string
                            hint: "Start with a verb: Tap, Open, Enter, Find..."
                          - label: "Media (optional)"
                            name: mediaType
                            widget: select
                            default: ""
                            required: false
                            hint: "Choose whether this step has a video, an image, or no media."
                            options:
                              - label: "No media"
                                value: ""
                              - label: "Video"
                                value: "video"
                              - label: "Image"
                                value: "image"
                          - label: "Media URL"
