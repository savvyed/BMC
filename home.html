<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMC Digital Health</title>
  <link rel="stylesheet" href="shared/css/styles.css">
</head>
<body>

  <!-- ============================================================
       HOME SCREEN
       Two option cards (course + knowledge base).
       Language handling depends on mode set on index.html:
         GTranslate — translate-bar shown; header-gt-select active
         Manual     — header lang button shown; translate-bar hidden
       ============================================================ -->

  <header class="site-header" role="banner">

    <a href="index.html" class="header-logo-placeholder" aria-label="BMC — return to welcome screen">
      BMC
    </a>

    <span class="header-title" aria-hidden="true">BMC Digital Health</span>

    <!-- Manual mode: tapping returns to language selector -->
    <!-- GTranslate mode: language is handled by the translate-bar below, not here -->
    <a href="lang-select.html" class="header-lang-btn" aria-label="Change language">
      🌐 <span data-string-key="langIndicator">English</span>
    </a>

  </header>

  <!-- GTranslate mode: prominent language bar above the tiles -->
  <div class="translate-bar" role="region" aria-label="Language selection">
    <span class="translate-bar-icon" aria-hidden="true">🌐</span>
    <span class="translate-bar-label">Choose your language:</span>
    <select class="translate-bar-select" aria-label="Choose language"
            onchange="if(window.doGTranslate)doGTranslate(this.value); this.selectedIndex=0;">
      <option value="">Select / Seleccionar</option>
      <option value="en|es">Español</option>
      <option value="en|pt">Português</option>
      <option value="en|ht">Kreyòl ayisyen</option>
      <option value="en|zh-CN">中文</option>
    </select>
  </div>

  <main class="page-content" id="main" role="main">

    <h1 class="home-heading" data-string-key="homeHeading">
      What would you like to do today?
    </h1>

    <div class="option-grid" role="list">

      <!-- Card 1 — Learn MyChart (internal) -->
      <a class="option-card"
         role="listitem"
         data-lang-href="course/index.html"
         href="course/index.html"
         aria-label="Learn MyChart step by step">
        <span class="option-card-icon" aria-hidden="true">📘</span>
        <span class="option-card-label" data-string-key="card1Label">
          Learn MyChart step by step
        </span>
      </a>

      <!-- Card 2 — Find help (internal) -->
      <a class="option-card"
         role="listitem"
         data-lang-href="help/index.html"
         href="help/index.html"
         aria-label="Find help with a specific task">
        <span class="option-card-icon" aria-hidden="true">🔍</span>
        <span class="option-card-label" data-string-key="card2Label">
          Find help with a specific task
        </span>
      </a>

    </div>

  </main>

  <footer class="site-footer" role="contentinfo">
    <a class="footer-link"
       data-lang-href="home.html"
       href="home.html"
       data-string-key="footerHome"
       aria-label="Home">
      🏠 Home
    </a>
    <a class="footer-link"
       data-lang-href="help/index.html"
       href="help/index.html"
       data-string-key="footerHelp"
       aria-label="Help — find help with a specific task">
      🔍 Help
    </a>
  </footer>

  <!-- GTranslate engine mount point (hidden via CSS in GTranslate mode) -->
  <div class="gtranslate_wrapper"></div>

  <script src="shared/js/translation-switcher.js"></script>
  <script src="shared/js/main.js"></script>
</body>
</html>
